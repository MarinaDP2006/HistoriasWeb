<main class="original-page">
  <header class="hero">
    <div class="hero-inner">
      <h1 class="title">Originales</h1>
      <p class="subtitle">Novelas y relatos originales por Ninai_06</p>
    </div>
  </header>
  <section class="search-section">
    <app-search-bar (search)="onSearch($event)"></app-search-bar>
  </section>
  <section class="content">
    <div *ngIf="isLoading()" class="loading">Cargando originales…</div>
    <div *ngIf="!isLoading() && filtered().length === 0" class="empty">
      No se encontraron historias originales que coincidan con tu búsqueda.
      <div class="actions">
        <a routerLink="/" class="btn btn-ghost">Volver al inicio</a>
      </div>
    </div>
    <div class="grid" *ngIf="!isLoading() && filtered().length > 0">
      <ng-container *ngFor="let s of filtered()">
        <app-book-card [story]="s"></app-book-card>
      </ng-container>
    </div>
  </section>
</main>
